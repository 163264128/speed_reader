<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: black;
            color: white;
            /* Changed to Montserrat to match your image! */
            font-family: 'Montserrat', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #text-input {
            width: 80%;
            max-width: 600px;
            height: 150px;
            background-color: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px;
            font-family: Arial, sans-serif; /* Kept text box as Arial for easy reading while pasting */
            font-size: 12pt;
            margin-bottom: 2rem;
            resize: vertical;
        }
        #text-input::placeholder {
            color: #888;
        }
        #display-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 80px;
        }
        #word-display {
            font-size: 32pt; /* Bumped up the size a bit for Montserrat */
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }
        #progress-counter {
            margin-top: 10px;
            font-size: 10pt;
            color: #666;
            font-family: Montserrat, sans-serif;
            display: none; /* Hidden until we hit play */
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14pt;
            margin-top: 8rem;
        }
        button, select {
            padding: 8px 16px;
            font-size: 12pt;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }
        button:hover, select:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <textarea id="text-input" placeholder="Paste the text you want to read right here..."></textarea>
    
    <div id="display-container">
        <div id="word-display">Ready?</div>
        <div id="progress-counter">Word 0 of 0</div>
    </div>
    
    <div class="controls">
        <button id="play-pause-btn">Play</button>
        <button id="restart-btn">Restart</button>
        
        <label for="wpm">Speed:</label>
        <select id="wpm">
            <option value="200">200 WPM</option>
            <option value="300" selected>300 WPM</option>
            <option value="450">450 WPM</option>
            <option value="600">600 WPM</option>
            <option value="800">800 WPM</option>
        </select>
    </div>

    <script>
        let words = [];
        let currentIndex = 0;
        let isPlaying = false;
        let intervalId = null;
        
        const textInput = document.getElementById('text-input');
        const displayElement = document.getElementById('word-display');
        const progressCounter = document.getElementById('progress-counter');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const restartBtn = document.getElementById('restart-btn');
        const wpmSelect = document.getElementById('wpm');
        
        function processText(text) {
            const rawWords = text.trim().split(/\s+/);
            let processed = [];
            let evenAlt = 0;
            
            for (let word of rawWords) {
                if (word.length === 0) continue;
                
                let firstIdx = -1;
                let lastIdx = -1;
                
                // This logic successfully ignores commas, semicolons, quotes, etc!
                for (let i = 0; i < word.length; i++) {
                    if (/[a-zA-Z0-9]/.test(word[i])) {
                        if (firstIdx === -1) firstIdx = i;
                        lastIdx = i;
                    }
                }
                
                if (firstIdx === -1) {
                    processed.push(word);
                    continue;
                }
                
                let n = lastIdx - firstIdx + 1;
                let coreMid;
                
                if (n % 2 !== 0) {
                    coreMid = Math.floor(n / 2);
                } else {
                    if (evenAlt === 0) {
                        coreMid = (n / 2) - 1;
                        evenAlt = 1;
                    } else {
                        coreMid = n / 2;
                        evenAlt = 0;
                    }
                }
                
                let actualMid = firstIdx + coreMid;
                
                let formattedWord = word.substring(0, actualMid) + 
                                    "<span style='color: red;'>" + word.charAt(actualMid) + "</span>" + 
                                    word.substring(actualMid + 1);
                processed.push(formattedWord);
            }
            return processed;
        }

        function updateCounter() {
            progressCounter.innerText = `Word ${currentIndex} of ${words.length}`;
        }

        function showNextWord() {
            if (currentIndex >= words.length) {
                pause();
                displayElement.innerHTML = "Done!";
                return;
            }
            displayElement.innerHTML = words[currentIndex];
            currentIndex++;
            updateCounter();
        }
        
        function play() {
            if (currentIndex === 0) {
                const text = textInput.value;
                if (!text.trim()) {
                    displayElement.innerHTML = "Please paste some text first!";
                    return;
                }
                words = processText(text);
                textInput.style.display = 'none';
                progressCounter.style.display = 'block'; // Show counter
            }

            if (currentIndex >= words.length) currentIndex = 0; 
            
            isPlaying = true;
            playPauseBtn.innerText = "Pause";
            
            const wpm = parseInt(wpmSelect.value);
            const msPerWord = 60000 / wpm; 
            
            showNextWord(); 
            intervalId = setInterval(showNextWord, msPerWord);
        }
        
        function pause() {
            isPlaying = false;
            playPauseBtn.innerText = "Play";
            clearInterval(intervalId);
        }
        
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) pause();
            else play();
        });
        
        restartBtn.addEventListener('click', () => {
            pause();
            currentIndex = 0;
            words = []; 
            displayElement.innerHTML = "Ready?";
            textInput.style.display = 'block';
            progressCounter.style.display = 'none'; // Hide counter
        });
        
        wpmSelect.addEventListener('change', () => {
            if (isPlaying) {
                pause();
                play();
            }
        });

        // Optional: Press Spacebar to Play/Pause
        document.addEventListener('keydown', (event) => {
            // Only trigger if we aren't typing in the text box!
            if (event.code === 'Space' && document.activeElement !== textInput) {
                event.preventDefault(); // Prevents the page from scrolling down
                if (isPlaying) pause();
                else play();
            }
        });
    </script>
</body>
</html>
